name: ApexMemory CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 24.x]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: src/package.json

    - name: Install Sub-Package Dependencies
      run: |
        cd src
        npm install

    - name: Verify Script Compilation
      run: |
        node src/bin/embed.js --help || true
        node src/bin/vector-db.js --help || true
        node src/bin/snapshot.js --help || true
        node src/bin/consolidate.js --help || true
        node src/bin/mine.js --help || true
